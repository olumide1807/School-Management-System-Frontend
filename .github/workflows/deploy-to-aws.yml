name: Deploy React App to S3

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          CI: false # This allows the build to continue even if there are warnings

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: AKIA3FLD6BRN7PSQA45Z
          aws-secret-access-key: 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
          aws-region: af-south-1

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://basitech-test1 --delete
